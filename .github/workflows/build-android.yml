name: Construir APK — Meu Caixa

on:
  push:
    branches: [main, 'claude/**']
    paths: ['android/**']
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Por que está rodando manualmente?'
        required: false
        default: 'Gerar APK atualizado'

permissions:
  contents: write

jobs:
  build-apk:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configurar Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Construir APK de debug
        working-directory: android
        run: gradle :app:assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Renomear APK
        run: |
          DATA=$(date '+%Y-%m-%d')
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/MeuCaixa-${DATA}.apk

      - name: Guardar APK como artifact (90 dias)
        uses: actions/upload-artifact@v4
        with:
          name: MeuCaixa-APK
          path: android/app/build/outputs/apk/debug/MeuCaixa-*.apk
          retention-days: 90

      - name: Publicar no GitHub Releases (download direto)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Meu Caixa — APK mais recente"
          body: |
            ## Como instalar no celular da empresa

            1. Baixe o arquivo `.apk` abaixo
            2. Transfira para o celular (WhatsApp, cabo USB, Google Drive, etc.)
            3. No celular: Configurações → Segurança → Ativar **"Instalar apps desconhecidos"**
            4. Abra o arquivo `.apk` e instale
            5. Abra o app **Meu Caixa** — ele fica aguardando automaticamente

            ---
            > APK gerado automaticamente em ${{ github.run_id }}
          files: android/app/build/outputs/apk/debug/MeuCaixa-*.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
